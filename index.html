<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stotra Viewer</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Sanscript.js for transliteration -->
  <script src="https://cdn.jsdelivr.net/npm/@sanskrit-coders/sanscript@1.2.2/sanscript.min.js"></script>
  <!-- Fuse.js for search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
</head>
<body>
  <header class="top-bar">
    <button id="menuBtn" class="icon-btn">☰</button>
    <h1>Stotra Viewer</h1>
    <div class="top-bar-right">
      <input id="searchInput" placeholder="🔍 Search shlokas..." />
      <button id="settingsBtn" class="icon-btn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <div class="app-shell">
    <aside id="sidebarLeft" class="sidebar sidebar-left">
      <div id="treeMenu"></div>
    </aside>

    <main id="mainContent" class="main-content">
      <div class="content-header">
        <h2 id="contentTitle">Select a work from the left menu</h2>
        <div class="content-controls">
          <select id="translitSelect">
            <option value="devanagari">Devanagari</option>
            <option value="telugu">Telugu</option>
            <option value="kannada">Kannada</option>
            <option value="iast">IAST</option>
          </select>
        </div>
      </div>
      <div id="shlokasContainer" class="shlokas-container"></div>
    </main>

    <aside id="sidebarRight" class="sidebar sidebar-right">
      <button id="rightMenuBtn" class="icon-btn close-btn">✕</button>
      <div class="sidebar-header">
        <h3>Bookmarks</h3>
      </div>
      <div id="bookmarksList"></div>
    </aside>
  </div>

  <div id="settingsPanel" class="settings-panel">
    <h4>Settings</h4>
    <label><input type="checkbox" id="liveSearch" checked> Live search</label>
    <label>Font size: <input type="range" id="fontSize" min="12" max="32" value="18"></label>
    <label>Theme: 
      <select id="themeSelect">
        <option>Light</option>
        <option>Dark</option>
        <option>Sepia</option>
      </select>
    </label>
  </div>

  <script src="app.js"></script>
</body>
</html>
